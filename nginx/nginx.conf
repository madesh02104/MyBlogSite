events {
  worker_connections 1024;
}

http {
  server_tokens off;

  server {
    listen 80;
    server_name blogsbymadesh.live www.blogsbymadesh.live;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://blogsbymadesh.live$request_uri;
    }
  }

  server {
    listen 80;
    server_name admin.blogsbymadesh.live;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://admin.blogsbymadesh.live$request_uri;
    }
  }

  server {
    listen 80;
    server_name api.blogsbymadesh.live;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://api.blogsbymadesh.live$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name blogsbymadesh.live www.blogsbymadesh.live;

    ssl_certificate /etc/letsencrypt/live/blogsbymadesh.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogsbymadesh.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://user-frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 443 ssl;
    server_name admin.blogsbymadesh.live;

    ssl_certificate /etc/letsencrypt/live/blogsbymadesh.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogsbymadesh.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://admin-frontend:80;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 443 ssl;
    server_name api.blogsbymadesh.live;

    ssl_certificate /etc/letsencrypt/live/blogsbymadesh.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blogsbymadesh.live/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://backend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
